<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Flap e-Solar</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    position: fixed;
    inset: 0;
    touch-action: none;
  }
  #game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    touch-action: none;
    cursor: pointer;
    max-width: 100vw;
    max-height: 100vh;
  }
  #hint {
    position: fixed;
    left: 50%;
    bottom: max(10px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: clamp(10px, 2.8vw, 11px);
    font-family: system-ui, sans-serif;
    letter-spacing: 1px;
    pointer-events: none;
    white-space: nowrap;
    max-width: calc(100vw - 20px);
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>
<canvas id="game" width="288" height="512"></canvas>
<div id="hint">SPACE / CLICK / TAP to flap &nbsp;·&nbsp; P to pause &nbsp;·&nbsp; R to restart</div>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const hint = document.getElementById("hint");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const W = 288, H = 512;
  const mobileQuery = window.matchMedia("(pointer: coarse), (max-width: 640px)");
  let mobileMode = mobileQuery.matches;

  function updateHint() {
    hint.innerHTML = mobileMode
      ? "TAP ANYWHERE to flap"
      : "SPACE / CLICK / TAP to flap &nbsp;&middot;&nbsp; P to pause &nbsp;&middot;&nbsp; R to restart";
  }

  function resize() {
    const vv = window.visualViewport;
    const vw = Math.max(1, vv?.width || window.innerWidth);
    const vh = Math.max(1, vv?.height || window.innerHeight);
    const s = Math.min(vw / W, vh / H);
    canvas.style.width  = Math.floor(W * s) + "px";
    canvas.style.height = Math.floor(H * s) + "px";
  }
  window.addEventListener("resize", resize);
  window.visualViewport?.addEventListener("resize", resize);
  mobileQuery.addEventListener?.("change", e => { mobileMode = e.matches; updateHint(); });
  mobileQuery.addListener?.(e => { mobileMode = e.matches; updateHint(); });
  updateHint();
  resize();

  // ---- Images ----
  const birdImg = new Image();
  const tubeImg = new Image();
  const titleImg = new Image();
  birdImg.src = "images/bird.png";
  tubeImg.src = "images/tube.png";
  titleImg.src = "images/title-screen.png";

  // Fraction of tube.png that contains the actual building (skips transparent padding)
  const TUBE_FX = 0.295, TUBE_FY = 0.07;
  const TUBE_FW = 0.42,  TUBE_FH = 0.83;

  // ---- Audio ----
  const flapAudio  = new Audio("audio/Eli.mp3");
  const crashAudio = new Audio("audio/GABAY.mp3");
  const menuEliAudio = new Audio("audio/Eli.mp3");
  const menuGabayAudio = new Audio("audio/GABAY.mp3");
  flapAudio.volume = 0.85;
  crashAudio.volume = 0.9;
  menuEliAudio.volume = 0.9;
  menuGabayAudio.volume = 0.9;
  // Attempt autoplay — works on localhost or after prior interaction; fails silently otherwise.
  let menuChantTimer = null;
  let menuChantStep = 0;
  let audioUnlocked = false;

  function safePlay(audio, restart = true) {
    try {
      if (restart) audio.currentTime = 0;
      const p = audio.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    } catch {}
  }

  function unlockAudio() {
    audioUnlocked = true;
    if (state === STATE.MENU) startMenuChant();
  }

  function stopAudio(audio) {
    try {
      audio.pause();
      audio.currentTime = 0;
    } catch {}
  }

  function chantMenuAudio() {
    if (state !== STATE.MENU) return;
    safePlay(menuChantStep % 2 === 0 ? menuEliAudio : menuGabayAudio);
    menuChantStep++;
  }

  function startMenuChant() {
    if (!audioUnlocked && menuChantStep > 0) return;
    if (!menuChantTimer) {
      chantMenuAudio();
      menuChantTimer = setInterval(chantMenuAudio, 360);
    }
  }

  function stopMenuChant() {
    if (menuChantTimer) {
      clearInterval(menuChantTimer);
      menuChantTimer = null;
    }
    stopAudio(menuEliAudio);
    stopAudio(menuGabayAudio);
  }

  function playFlap()  { safePlay(flapAudio); }
  function playCrash() { safePlay(crashAudio); }

  // ---- Procedural background ----
  function offscreen(w, h) {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    return c;
  }

  const bgCanvas = (() => {
    const c = offscreen(W, H), cx = c.getContext("2d");
    const g = cx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#4ec0ca"); g.addColorStop(1, "#70c5ce");
    cx.fillStyle = g; cx.fillRect(0, 0, W, H);
    cx.fillStyle = "#fff";
    for (let i = 0; i < 6; i++) {
      const cx2 = (i * 53 + 20) % W, cy2 = 60 + (i * 17) % 80;
      cx.beginPath();
      cx.arc(cx2, cy2, 10, 0, Math.PI * 2);
      cx.arc(cx2 + 10, cy2 + 2, 8, 0, Math.PI * 2);
      cx.arc(cx2 - 10, cy2 + 2, 8, 0, Math.PI * 2);
      cx.fill();
    }
    cx.fillStyle = "#5ea44d";
    cx.beginPath(); cx.moveTo(0, H - 120);
    for (let x = 0; x <= W; x += 20)
      cx.lineTo(x, H - 120 - Math.sin(x * 0.05) * 10 - (x * 3) % 7);
    cx.lineTo(W, H); cx.lineTo(0, H); cx.closePath(); cx.fill();
    cx.fillStyle = "#74bf4a";
    for (let x = -10; x < W + 10; x += 24) {
      cx.beginPath();
      cx.arc(x + 8, H - 112, 10, 0, Math.PI * 2);
      cx.arc(x + 18, H - 114, 8, 0, Math.PI * 2);
      cx.arc(x, H - 114, 8, 0, Math.PI * 2);
      cx.fill();
    }
    return c;
  })();

  const groundTile = (() => {
    const tW = 24, tH = 112, c = offscreen(tW, tH), cx = c.getContext("2d");
    cx.fillStyle = "#ded895"; cx.fillRect(0, 0, tW, tH);
    cx.fillStyle = "#73bf2e"; cx.fillRect(0, 0, tW, 6);
    cx.fillStyle = "#4ea517"; cx.fillRect(0, 6, tW, 3);
    cx.fillStyle = "#c9b96b";
    for (let y = 14; y < tH; y += 8) cx.fillRect(0, y, tW, 2);
    cx.strokeStyle = "#b59f4d"; cx.lineWidth = 1;
    for (let i = -tH; i < tW; i += 8) {
      cx.beginPath(); cx.moveTo(i, tH); cx.lineTo(i + tH, 10); cx.stroke();
    }
    cx.fillStyle = "#73bf2e"; cx.fillRect(0, 0, tW, 6);
    cx.fillStyle = "#4ea517"; cx.fillRect(0, 6, tW, 3);
    return c;
  })();

  // ---- Constants ----
  const GROUND_Y     = H - 112;
  const GRAVITY      = 0.34;
  const FLAP_V       = -5.9;
  const MAX_VY       = 9;
  const PIPE_W       = 68;
  const PIPE_GAP_MAX = 132;
  const PIPE_GAP_MIN = 92;
  const PIPE_GAP_STEP = 0.75;
  const PIPE_SPACING = 190;
  const SCROLL       = 1.8;
  const MOBILE_GAP_BONUS = 12;
  const FIRST_PIPE_X = () => W + (mobileMode ? 105 : 70);
  const BIRD_W       = 40;
  const BIRD_H       = 40;
  const BIRD_R       = 12;
  const STATE = { MENU: 0, PLAYING: 1, DYING: 2, OVER: 3, PAUSED: 4 };

  // ---- Game state ----
  const bird = { x: 70, y: H / 2, vy: 0, rot: 0 };
  let pipes = [], groundX = 0, state = STATE.MENU;
  let score = 0, best = 0, flashT = 0, shakeT = 0, overSince = 0;
  try { best = +localStorage.getItem("fb_best") || 0; } catch {}
  startMenuChant();

  function gapForScore(s) {
    const bonus = mobileMode ? MOBILE_GAP_BONUS : 0;
    return Math.round(Math.max(PIPE_GAP_MIN + bonus, PIPE_GAP_MAX + bonus - s * PIPE_GAP_STEP));
  }

  function makePipe(x) {
    const gap = gapForScore(score);
    const minTop = 48;
    const maxTop = GROUND_Y - gap - 58;
    const topH = Math.round(minTop + Math.random() * Math.max(1, maxTop - minTop));
    return { x, topH, gap, passed: false, topSprite: null, bottomSprite: null };
  }

  function spawnPipes() {
    pipes = [];
    let x = FIRST_PIPE_X();
    for (let i = 0; i < 4; i++) {
      const p = makePipe(x);
      ensurePipeSprites(p);
      pipes.push(p);
      x += PIPE_SPACING;
    }
  }

  function startGame() {
    score = 0; flashT = 0; shakeT = 0; groundX = 0;
    Object.assign(bird, { x: 70, y: H / 2, vy: FLAP_V, rot: 0 });
    spawnPipes();
    state = STATE.PLAYING;
    stopMenuChant();
    playFlap();
  }

  function resetToMenu() {
    Object.assign(bird, { x: 70, y: H / 2, vy: 0, rot: 0 });
    pipes = []; groundX = 0;
    score = 0; flashT = 0; shakeT = 0; overSince = 0;
    state = STATE.MENU;
    startMenuChant();
  }

  // ---- Input ----
  function flap() {
    if (state === STATE.MENU) {
      unlockAudio();
      startGame();
      return;
    }
    if (state === STATE.PLAYING) { bird.vy = FLAP_V; playFlap(); return; }
    if (state === STATE.PAUSED) { state = STATE.PLAYING; return; }
    if (state === STATE.OVER && performance.now() - overSince > 400) resetToMenu();
  }

  window.addEventListener("keydown", e => {
    if (["Space","ArrowUp","KeyW"].includes(e.code)) {
      e.preventDefault();
      if (!e.repeat) flap();
    }
    else if (e.code === "KeyP") {
      if (state === STATE.PLAYING) state = STATE.PAUSED;
      else if (state === STATE.PAUSED) state = STATE.PLAYING;
    } else if (e.code === "KeyR" && state !== STATE.MENU) resetToMenu();
  });
  window.addEventListener("blur", () => {
    if (state === STATE.PLAYING) state = STATE.PAUSED;
  });

  let lastPressAt = 0;
  function press(e) {
    const now = performance.now();
    if (now - lastPressAt < 60) return;
    lastPressAt = now;
    e.preventDefault();
    try {
      if (e.pointerId !== undefined) canvas.setPointerCapture?.(e.pointerId);
    } catch {}
    flap();
  }

  window.addEventListener("pointerdown", e => {
    if (e.isPrimary === false) return;
    press(e);
  }, { passive: false });
  document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
  if (!window.PointerEvent) {
    window.addEventListener("touchstart", e => press(e), { passive: false });
    window.addEventListener("mousedown", e => press(e), { passive: false });
  }
  window.addEventListener("contextmenu", e => {
    e.preventDefault();
  });

  // ---- Update ----
  function circleRect(rx, ry, rw, rh) {
    const nx = Math.max(rx, Math.min(bird.x, rx + rw));
    const ny = Math.max(ry, Math.min(bird.y, ry + rh));
    return (bird.x - nx) ** 2 + (bird.y - ny) ** 2 < BIRD_R ** 2;
  }

  function die(hitGround) {
    if (state !== STATE.PLAYING) return;
    playCrash(); flashT = 6; shakeT = 12;
    if (hitGround) {
      state = STATE.OVER; overSince = performance.now();
      if (score > best) { best = score; try { localStorage.setItem("fb_best", best); } catch {} }
    } else {
      state = STATE.DYING; bird.vy = -3;
    }
  }

  function update(dt) {
    if (state === STATE.PAUSED) return;

    if (state === STATE.MENU) {
      bird.y = H / 2 + Math.sin(performance.now() / 220) * 6;
      bird.rot = 0;
      groundX = (groundX - SCROLL * dt) % groundTile.width;
      return;
    }

    if (state === STATE.PLAYING) {
      bird.vy = Math.min(MAX_VY, bird.vy + GRAVITY * dt);
      bird.y += bird.vy * dt;
      const tgt = bird.vy < 0 ? -0.5 : Math.min(Math.PI / 2, bird.vy / 10);
      bird.rot += (tgt - bird.rot) * 0.15 * dt;

      for (const p of pipes) p.x -= SCROLL * dt;
      while (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
      while (pipes.length < 5) {
        const lastX = pipes.length ? pipes[pipes.length - 1].x : FIRST_PIPE_X();
        const p = makePipe(lastX + PIPE_SPACING);
        ensurePipeSprites(p);
        pipes.push(p);
      }
      groundX = (groundX - SCROLL * dt) % groundTile.width;

      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < bird.x - BIRD_R) { p.passed = true; score++; }
      }
      if (bird.y + BIRD_R >= GROUND_Y) { bird.y = GROUND_Y - BIRD_R; die(true); return; }
      if (bird.y - BIRD_R < 0) { bird.y = BIRD_R; bird.vy = 0; }
      for (const p of pipes) {
        if (circleRect(p.x, 0, PIPE_W, p.topH) ||
            circleRect(p.x, p.topH + p.gap, PIPE_W, GROUND_Y - p.topH - p.gap)) {
          die(false); break;
        }
      }
    }

    if (state === STATE.DYING) {
      bird.vy = Math.min(MAX_VY, bird.vy + GRAVITY * dt);
      bird.y += bird.vy * dt;
      bird.rot = Math.min(Math.PI / 2, bird.rot + 0.15 * dt);
      if (bird.y + BIRD_R >= GROUND_Y) {
        bird.y = GROUND_Y - BIRD_R;
        state = STATE.OVER; overSince = performance.now();
        if (score > best) { best = score; try { localStorage.setItem("fb_best", best); } catch {} }
      }
    }

    flashT = Math.max(0, flashT - dt);
    shakeT = Math.max(0, shakeT - dt);
  }

  // ---- Render ----
  function txt(t, x, y, sz, col) {
    ctx.save();
    ctx.font = `bold ${sz}px system-ui, sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "top";
    ctx.lineWidth = 3; ctx.strokeStyle = "#000"; ctx.strokeText(t, x, y);
    ctx.fillStyle = col || "#fff"; ctx.fillText(t, x, y);
    ctx.restore();
  }

  function roundedRect(x, y, w, h, r) {
    if (typeof ctx.roundRect === "function") {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      return;
    }
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.lineTo(x + w - rr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
    ctx.lineTo(x + w, y + h - rr);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    ctx.lineTo(x + rr, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
    ctx.lineTo(x, y + rr);
    ctx.quadraticCurveTo(x, y, x + rr, y);
  }

  function panel(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = "rgba(12,22,40,0.92)";
    roundedRect(x, y, w, h, 8); ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
    roundedRect(x + 1, y + 1, w - 2, h - 2, 8); ctx.stroke();
    ctx.restore();
  }

  function drawFallbackPipe(x, y, w, h, top) {
    if (h <= 0) return;
    ctx.fillStyle = "#2f9e44";
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = "#37b24d";
    ctx.fillRect(x + 5, y, Math.max(1, w - 10), h);
    ctx.strokeStyle = "#1b5e20";
    ctx.lineWidth = 3;
    ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
    const capH = 18;
    const cy = top ? y + h - capH : y;
    ctx.fillStyle = "#40c057";
    ctx.fillRect(x - 4, cy, w + 8, capH);
    ctx.strokeRect(x - 4, cy, w + 8, capH);
  }

  function makeTubeSprite(h, top) {
    if (h <= 0 || !tubeImg.complete || !tubeImg.naturalWidth) return null;
    const c = offscreen(PIPE_W, h);
    const cx = c.getContext("2d");
    cx.imageSmoothingEnabled = false;
    const nW = tubeImg.naturalWidth, nH = tubeImg.naturalHeight;
    const sx = nW * TUBE_FX, sy = nH * TUBE_FY;
    const sw = nW * TUBE_FW, sh = nH * TUBE_FH;

    if (top) {
      cx.save();
      cx.translate(0, h);
      cx.scale(1, -1);
      cx.drawImage(tubeImg, sx, sy, sw, sh, 0, 0, PIPE_W, h);
      cx.restore();
    } else {
      cx.drawImage(tubeImg, sx, sy, sw, sh, 0, 0, PIPE_W, h);
    }
    return c;
  }

  function ensurePipeSprites(p) {
    if (!tubeImg.complete || !tubeImg.naturalWidth) return false;
    const bY = p.topH + p.gap;
    if (!p.topSprite) p.topSprite = makeTubeSprite(p.topH, true);
    if (!p.bottomSprite) p.bottomSprite = makeTubeSprite(GROUND_Y - bY, false);
    return !!(p.topSprite && p.bottomSprite);
  }

  function drawPipes() {
    if (state === STATE.MENU) return;
    const hasTube = tubeImg.complete && tubeImg.naturalWidth;

    for (const p of pipes) {
      const bY = p.topH + p.gap;
      const x = Math.round(p.x);
      if (hasTube && ensurePipeSprites(p)) {
        ctx.drawImage(p.topSprite, x, 0);
        ctx.drawImage(p.bottomSprite, x, bY);
      } else {
        drawFallbackPipe(x, 0, PIPE_W, p.topH, true);
        drawFallbackPipe(x, bY, PIPE_W, GROUND_Y - bY, false);
      }
    }
  }

  let birdSprite = null;
  function getBirdSprite() {
    if (birdSprite || !birdImg.complete || !birdImg.naturalWidth) return birdSprite;
    birdSprite = offscreen(BIRD_W, BIRD_H);
    const bx = birdSprite.getContext("2d");
    bx.imageSmoothingEnabled = false;
    bx.drawImage(birdImg, 0, 0, BIRD_W, BIRD_H);
    return birdSprite;
  }

  function drawBird() {
    ctx.save();
    ctx.translate(Math.round(bird.x), Math.round(bird.y));
    ctx.rotate(bird.rot);
    const sprite = getBirdSprite();
    if (sprite) {
      ctx.drawImage(sprite, -BIRD_W / 2, -BIRD_H / 2);
    } else {
      ctx.fillStyle = "#ffd43b";
      ctx.beginPath();
      ctx.arc(0, 0, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ff922b";
      ctx.beginPath();
      ctx.moveTo(12, -3);
      ctx.lineTo(24, 2);
      ctx.lineTo(12, 7);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(5, -6, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }


  function render() {
    let ox = 0, oy = 0;
    if (shakeT > 0) { ox = (Math.random() - 0.5) * 4; oy = (Math.random() - 0.5) * 4; }

    ctx.save();
    ctx.translate(ox, oy);

    // Background
    ctx.drawImage(bgCanvas, 0, 0);

    // Pipes — tube.png building sprite, padding cropped so it reaches the edges
    drawPipes();

    // Ground
    for (let x = Math.floor(groundX); x < W; x += groundTile.width)
      ctx.drawImage(groundTile, x, GROUND_Y);

    drawBird();

    ctx.restore();

    // Flash on hit
    if (flashT > 0) {
      ctx.fillStyle = `rgba(255,255,255,${0.6 * flashT / 6})`;
      ctx.fillRect(0, 0, W, H);
    }

    // HUD
    if (state === STATE.MENU) {
      if (titleImg.complete && titleImg.naturalWidth) {
        const tw = 210;
        const th = Math.min(110, tw * titleImg.naturalHeight / titleImg.naturalWidth);
        ctx.drawImage(titleImg, (W - tw) / 2, 58, tw, th);
        txt(mobileMode ? "tap anywhere to start" : "press space to start", W / 2, 174, 13, "#fff");
        if (best > 0) txt("BEST: " + best, W / 2, 202, 12, "#fff");
      } else {
        txt("FLAP e-SOLAR", W / 2, 90, 28, "#ffeb3b");
        txt(mobileMode ? "tap anywhere to start" : "press space to start", W / 2, 145, 13, "#fff");
        if (best > 0) txt("BEST: " + best, W / 2, 172, 12, "#fff");
      }
    } else if (state === STATE.PLAYING || state === STATE.DYING) {
      txt(String(score), W / 2, 40, 28, "#fff");
    } else if (state === STATE.OVER) {
      txt(String(score), W / 2, 40, 28, "#fff");
      const pw = 200, ph = 150, px = (W - pw) / 2, py = (H - ph) / 2 - 20;
      panel(px, py, pw, ph);
      txt("GAME OVER", W / 2, py + 14, 20, "#ff4757");
      txt("Score: " + score, W / 2, py + 56, 14, "#fff");
      const m = score >= 60 ? "PLATINUM" : score >= 40 ? "GOLD" : score >= 20 ? "SILVER" : score >= 5 ? "BRONZE" : null;
      if (m) txt("Medal: " + m, W / 2, py + 78, 12, "#ffd54f");
      txt("Best:  " + best, W / 2, py + 100, 14, "#fff");
      txt("tap for menu", W / 2, py + ph - 24, 10, "#fff");
    } else if (state === STATE.PAUSED) {
      txt("PAUSED", W / 2, H / 2 - 20, 24, "#ffeb3b");
      txt(mobileMode ? "tap to resume" : "press P to resume", W / 2, H / 2 + 10, 12, "#fff");
    }
  }

  // ---- Loop ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(2.5, (now - last) / (1000 / 60));
    last = now;
    update(dt); render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(t => { last = t; loop(t); });
})();
</script>
</body>
</html>
